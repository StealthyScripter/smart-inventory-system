# SQLite. Versions 3.8.0 and up are supported for local development/test.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
# Production marketplace deployments should use PostgreSQL via DATABASE_URL.
# The SQLite production fallback below is retained for local containers,
# demos, and backwards-compatible single-node deploys.
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3


# Prefer DATABASE_URL=postgres://... for production. When DATABASE_URL is not
# present, Rails uses the SQLite fallback in storage/ so existing demo deploys
# and local production smoke tests keep working.
production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
